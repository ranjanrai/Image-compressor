<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Image Compressor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Tahoma,sans-serif;
}

body{
    background:#f4f7fb;
    color:#222;
}

.app{
    max-width:1250px;
    margin:25px auto;
    background:#fff;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 35px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:25px;
    color:#0f172a;
    font-weight:700;
}

/* ================= DROP AREA ================= */

.drop{
    border:3px dashed #3b82f6;
    border-radius:15px;
    padding:45px;
    text-align:center;
    cursor:pointer;
    background:#f8fbff;
    transition:.3s;
    font-size:20px;
    color:#2563eb;
    font-weight:600;
}

.drop:hover{
    background:#edf6ff;
    transform:scale(1.01);
}

.drop.drag{
    background:#dbeafe;
    border-color:#2563eb;
}

/* ================= FILE LIST ================= */

.filelist{
    margin:25px 0;
    border:1px solid #ddd;
    border-radius:10px;
    overflow:hidden;
}

.filelist b{
    display:block;
    background:#2563eb;
    color:#fff;
    padding:12px;
    font-size:18px;
}

.filelist div{
    display:grid;
    grid-template-columns:1fr 90px 45px;
    align-items:center;
    gap:10px;
    padding:12px 15px;
    border-bottom:1px solid #eee;
}

.filelist div:hover{
    background:#fafafa;
}

/* ================= CONTROLS ================= */

.controls{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    margin:20px 0;
}

.controls select,
.controls input{
    width:100%;
    height:45px;
    border:1px solid #ccc;
    border-radius:8px;
    padding:0 12px;
    font-size:15px;
    transition:.25s;
}

.controls select:focus,
.controls input:focus{
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

/* ================= BUTTONS ================= */

button{
    height:45px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.97);
}

button{
    background:#0ea5e9;
    color:white;
}

.secondary{
    background:#22c55e;
}

.filelist button{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#ef4444;
}

/* ================= PROGRESS ================= */

.progress{
    height:14px;
    background:#e5e7eb;
    border-radius:100px;
    overflow:hidden;
    margin:20px 0;
    display:none;
}

.progress div{
    height:100%;
    width:0;
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    transition:.3s;
}

/* ================= RESULT GRID ================= */

.list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:20px;
    margin-top:25px;
}

/* ================= CARD ================= */

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #ddd;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:220px;
    object-fit:contain;
    background:#f8fafc;
    border-bottom:1px solid #eee;
}

.card .content{
    padding:15px;
}

.card small{
    display:block;
    margin:6px 0;
    color:#555;
    font-size:14px;
}

.card .buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.card .buttons button{
    flex:1;
}

/* ================= FOOTER ================= */

footer{
    margin-top:30px;
    text-align:center;
    color:#666;
    font-size:14px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

h1{
    font-size:30px;
}

.drop{
    padding:30px;
    font-size:18px;
}

.controls{
    grid-template-columns:1fr;
}

.filelist div{
    grid-template-columns:1fr;
}

.list{
    grid-template-columns:1fr;
}

}
</style>
</head>

<body>
<div class="app">

<h1>Pro Image Compressor</h1>

<div class="drop" id="drop">Drag & Drop Images<br><b>or Click to Select</b></div>
<input type="file" id="file" accept="image/*" multiple hidden>

<div class="filelist" id="fileList"></div>

<div class="controls">

  <!-- SIZE MODE -->
  <select id="sizeMode">
    <option value="exact">Exact Size</option>
    <option value="max">Max Size (≤)</option>
    <option value="ratio">Compression %</option>
  </select>

  <input type="number" id="globalTarget" value="200" placeholder="Value">
  <select id="unit">
    <option>KB</option>
    <option>MB</option>
  </select>

  <!-- RESIZE -->
  <select id="resizeMode">
    <option value="none">No Resize</option>
    <option value="percent">Resize %</option>
    <option value="pixel">Resize Width</option>
    <option value="wh">Width × Height</option>
  </select>

  <input type="number" id="resizeValue" placeholder="Value">
  <input type="number" id="resizeWidth" placeholder="Width">
  <input type="number" id="resizeHeight" placeholder="Height">

  <label>
    <input type="checkbox" id="lockRatio" checked> Lock Ratio
  </label>

  <!-- FORMAT -->
  <select id="compressMode">
    <option value="exact">PNG → JPG</option>
    <option value="png">Keep PNG</option>
  </select>

  <button onclick="startCompression()">START</button>
  <button onclick="downloadZIP()" class="secondary">Download ZIP</button>

</div>

<div class="progress"><div id="bar"></div></div>
<div class="list" id="list"></div>

<footer>Exact • Max • Percentage • Large File Safe • EXIF Fixed</footer>

</div>

<script>
/* ================= CONFIG ================= */
const MAX_DIM = 2500;
const MAX_ITER = 20;

/* ================= UI ================= */
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");
const fileListBox = document.getElementById("fileList");
const list = document.getElementById("list");
const bar = document.getElementById("bar");
const progressBox = document.querySelector(".progress");

let files = [], results = [];

drop.onclick = () => fileInput.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add("drag"); };
drop.ondragleave = () => drop.classList.remove("drag");
drop.ondrop = e => { e.preventDefault(); drop.classList.remove("drag"); addFiles(e.dataTransfer.files); };
fileInput.onchange = () => addFiles(fileInput.files);

function addFiles(fileList) {
  [...fileList].forEach(file => {
    files.push({
      id: crypto.randomUUID(),
      file: file,
      target: Number(document.getElementById("globalTarget").value)
    });
  });

  renderFileList();

  // allow selecting the same file again
  fileInput.value = "";
}

function removeFile(i){
  files.splice(i,1);
  renderFileList();
}

function renderFileList(){
  fileListBox.innerHTML=`<b>Added Files (${files.length})</b>`;
  files.forEach((x,i)=>{
    fileListBox.innerHTML+=`
      <div>
        ${x.file.name} (${(x.file.size/1024).toFixed(1)} KB)
        <input type="number" value="${x.target}" onchange="files[${i}].target=this.value">
        <button onclick="removeFile(${i})">❌</button>
      </div>`;
  });
}

/* ================= HELPERS ================= */

function canvasToBlob(canvas,type,quality){
  return new Promise(r=>canvas.toBlob(b=>r(b),type,quality));
}

function calcResize(w,h){
  const rm=resizeMode.value,rv=+resizeValue.value,rw=+resizeWidth.value,rh=+resizeHeight.value;
  if(rm==="percent"&&rv) return [w*rv/100,h*rv/100];
  if(rm==="pixel"&&rv) return lockRatio.checked?[rv,h*(rv/w)]:[rv,h];
  if(rm==="wh"){
    if(lockRatio.checked){
      if(rw) return [rw,h*(rw/w)];
      if(rh) return [w*(rh/h),rh];
    }
    return [rw||w,rh||h];
  }
  return [w,h];
}

function applyOrientation(ctx,o,w,h){
  ctx.setTransform(1,0,0,1,0,0);
  if(o===3){ctx.translate(w,h);ctx.rotate(Math.PI);}
  if(o===6){ctx.rotate(0.5*Math.PI);ctx.translate(0,-h);}
  if(o===8){ctx.rotate(-0.5*Math.PI);ctx.translate(-w,0);}
}

/* ================= CORE ================= */

async function compressImage(obj) {

    const file = obj.file;

    return new Promise(resolve => {

        EXIF.getData(file, function () {

            const orientation = EXIF.getTag(this, "Orientation") || 1;

            const img = new Image();

            img.onload = async () => {

                const isPNG = file.type === "image/png";
                const keepPNG = (compressMode.value === "png");

let targetKB;

if (sizeMode.value === "ratio") {

    // Individual percentage
    targetKB = (file.size / 1024) * (obj.target / 100);

} else {

    // Global Exact / Max value for every image
    targetKB = Number(document.getElementById("globalTarget").value);

    if (unit.value === "MB")
        targetKB *= 1024;
}

                // Initial dimensions
                let width = img.width;
                let height = img.height;

                if (width > MAX_DIM || height > MAX_DIM) {
                    const scale = Math.min(MAX_DIM / width, MAX_DIM / height);
                    width *= scale;
                    height *= scale;
                }

                let bestBlob = null;
                let bestDiff = Infinity;

                // Resize until target becomes possible
                while (true) {

                    const canvas = document.createElement("canvas");
                    canvas.width = Math.round(width);
                    canvas.height = Math.round(height);

                    const ctx = canvas.getContext("2d");

                    applyOrientation(ctx, orientation, canvas.width, canvas.height);

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    //------------------------------------
                    // KEEP PNG
                    //------------------------------------
                    if (isPNG && keepPNG) {

                        const blob = await canvasToBlob(canvas, "image/png", 1);

                        return resolve({
                            id: obj.id,
                            name: file.name,
                            blob,
                            size: (blob.size / 1024).toFixed(1)
                        });

                    }

                    //------------------------------------
                    // Binary Search JPEG Quality
                    //------------------------------------

                    let low = 0.02;
                    let high = 0.98;

                    let localBest = null;
                    let localDiff = Infinity;

                    for (let i = 0; i < 40; i++) {

                        const quality = (low + high) / 2;

                        const blob = await canvasToBlob(
                            canvas,
                            "image/jpeg",
                            quality
                        );

                        const sizeKB = blob.size / 1024;
                        const diff = sizeKB - targetKB;

                        if (Math.abs(diff) < localDiff) {
                            localDiff = Math.abs(diff);
                            localBest = blob;
                        }

                        if (Math.abs(diff) <= 0.5)
                            break;

                        if (sizeKB > targetKB)
                            high = quality;
                        else
                            low = quality;
                    }

                    if (localDiff < bestDiff) {
                        bestDiff = localDiff;
                        bestBlob = localBest;
                    }

                    const bestSize = bestBlob.size / 1024;

                    // Exact
                    if (Math.abs(bestSize - targetKB) <= 0.5)
                        break;

                    // Max Size mode
                    if (sizeMode.value === "max" && bestSize <= targetKB)
                        break;

                    // Reduce dimensions slightly and retry
                    width *= 0.95;
                    height *= 0.95;

                    // Prevent infinite loop
                    if (width < 120 || height < 120)
                        break;
                }

                resolve({
                    id: obj.id,
                    name: file.name.replace(/\.\w+$/, ".jpg"),
                    blob: bestBlob,
                    size: (bestBlob.size / 1024).toFixed(1)
                });

            };

            img.src = URL.createObjectURL(file);

        });

    });

}
/* ================= RUN ================= */

async function startCompression(){
  if(!files.length) return alert("Add images first");
  results=[];list.innerHTML="";
  progressBox.style.display="block";bar.style.width="0%";

  for(let i=0;i<files.length;i++){
    const res = await compressImage(files[i]);
results.push(res);
    showCard(res,files[i].file);
    bar.style.width=((i+1)/files.length*100)+"%";
  }
}

function showCard(res,file){

    const url=URL.createObjectURL(res.blob);

    list.innerHTML+=`

    <div class="card">

        <img src="${url}">

        <div class="content">

            <small><b>Original Size:</b> ${(file.size/1024).toFixed(1)} KB</small>

            <small><b>Compressed:</b> ${res.size} KB</small>

            <div class="buttons">

                <button onclick="downloadFile('${url}','${res.name}')">
                    ⬇ Download
                </button>

                <button class="secondary"
                    onclick="deleteCompressed('${res.id}')">
                    🗑 Delete
                </button>

            </div>

        </div>

    </div>`;

}

function downloadFile(url,name){
  const a=document.createElement("a");
  a.href=url;a.download=name;a.click();
}
function deleteCompressed(id) {
  results = results.filter(r => r.id !== id);

  const card = [...document.querySelectorAll(".card")];
  card.forEach(c => {
    const btn = c.querySelector("button:last-child");
    if (btn && btn.getAttribute("onclick").includes(id)) {
      c.remove();
    }
  });
}

function downloadZIP(){
  if(!results.length) return alert("No compressed images");
  const zip=new JSZip();
  results.forEach(r=>zip.file("compressed_"+r.name,r.blob));
  zip.generateAsync({type:"blob"}).then(b=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(b);
    a.download="compressed_images.zip";
    a.click();
  });
}
</script>
</body>
</html>
